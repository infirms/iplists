name: Update lists

on:
  workflow_dispatch:
  schedule:
    # Every six hours.
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: update-lists
  cancel-in-progress: false

env:
  ZIG_VERSION: "0.16.0"
  SING_BOX_VERSION: "1.13.14"
  SING_BOX_SHA256: "f48703461a15476951ac4967cdad339d986f4b8096b4eb3ff0829a500502d697"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Restore sing-box
        id: sing-box-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .tools/sing-box
          key: sing-box-${{ runner.os }}-${{ runner.arch }}-${{ env.SING_BOX_VERSION }}-${{ env.SING_BOX_SHA256 }}

      - name: Install sing-box
        if: steps.sing-box-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p .tools/sing-box

          sing_box_archive="sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz"
          curl --fail --show-error --location --retry 3 \
            --output "${sing_box_archive}" \
            "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/${sing_box_archive}"
          printf '%s  %s\n' "${SING_BOX_SHA256}" "${sing_box_archive}" | sha256sum --check
          tar -xzf "${sing_box_archive}" -C .tools/sing-box --strip-components=1
          rm -- "${sing_box_archive}"

      - name: Add sing-box to PATH
        run: echo "$GITHUB_WORKSPACE/.tools/sing-box" >> "$GITHUB_PATH"

      - name: Verify tools
        run: |
          set -euo pipefail
          test "$(zig version)" = "${ZIG_VERSION}"
          sing-box version | grep -F "sing-box version ${SING_BOX_VERSION}"

      - name: Test
        run: zig build test -Doptimize=ReleaseSafe

      - name: Build
        run: zig build -Doptimize=ReleaseSafe

      - name: Collect lists
        run: ./zig-out/bin/iplists collect

      - name: Compile rule sets
        run: ./zig-out/bin/iplists compile

      - name: Commit changed lists
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git add --all -- lists formats

          if git diff --cached --quiet; then
            echo "Lists are already up to date."
            exit 0
          fi
          # note: source https://github.com/orgs/community/discussions/119597
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat(iplists): update generated lists"
          git push origin "HEAD:${DEFAULT_BRANCH}"
